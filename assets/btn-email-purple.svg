<svg xmlns="http://www.w3.org/2000/svg" width="180" height="36" viewBox="0 0 180 36">
  <defs>
    <linearGradient id="btnEmailPBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
  </defs>
  <rect width="180" height="36" rx="8" fill="url(#btnEmailPBg)" stroke="#8B5CF6" stroke-width="1.2"/>

  <!-- Mail icon -->
  <g transform="translate(20, 18)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" stroke="#8B5CF6" stroke-width="1.4" fill="none"/>
    <polyline points="-8,-6 0,2 8,-6" stroke="#8B5CF6" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <line x1="46" y1="8" x2="46" y2="28" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="23" font-family="'Fira Code', 'Courier New', monospace" font-size="12" font-weight="700" fill="#8B5CF6" letter-spacing="0.8">kforge.dev</text>
</svg>
