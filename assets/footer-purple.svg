<svg xmlns="http://www.w3.org/2000/svg" width="900" height="90" viewBox="0 0 900 90">
  <defs>
    <linearGradient id="footerBgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
    <clipPath id="footerClipP">
      <path d="M0,22 Q150,0 300,16 Q450,32 600,14 Q750,0 900,18 L900,90 L0,90 Z"/>
    </clipPath>
    <filter id="footerGlowP" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wave shape + fill -->
  <path d="M0,22 Q150,0 300,16 Q450,32 600,14 Q750,0 900,18 L900,90 L0,90 Z" fill="url(#footerBgP)"/>

  <!-- Border top wave -->
  <path d="M0,22 Q150,0 300,16 Q450,32 600,14 Q750,0 900,18" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Corner brackets bottom -->
  <polyline points="0,70 0,90 20,90" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
  <polyline points="880,90 900,90 900,70" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>

  <!-- K-FORGE branding -->
  <text x="450" y="56" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="15" font-weight="700" fill="#8B5CF6" letter-spacing="4" filter="url(#footerGlowP)">K-FORGE</text>
  <text x="450" y="74" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="9" fill="#A78BFA" letter-spacing="2" opacity="0.8">Club de desarrollo · Fundacion Universitaria Konrad Lorenz</text>

  <!-- Shimmer -->
  <rect clip-path="url(#footerClipP)" x="-200" y="0" width="180" height="90" opacity="0.04">
    <animateTransform attributeName="transform" type="translate" from="-200 0" to="1100 0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="white;white" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
