<svg xmlns="http://www.w3.org/2000/svg" width="320" height="44" viewBox="0 0 320 44">
  <defs>
    <linearGradient id="emailBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
    <filter id="emailGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="44" rx="10" fill="url(#emailBg)" stroke="#8B5CF6" stroke-width="1.5"/>

  <g transform="translate(24, 22)" filter="url(#emailGlow)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" stroke="#8B5CF6" stroke-width="1.6" fill="none"/>
    <polyline points="-8,-6 0,2 8,-6" stroke="#8B5CF6" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <line x1="52" y1="10" x2="52" y2="34" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1"/>

  <text x="64" y="28" font-family="'Fira Code', 'Courier New', monospace" font-size="13" font-weight="700" fill="#8B5CF6" letter-spacing="1.5">KFORGE.DEV</text>
</svg>
