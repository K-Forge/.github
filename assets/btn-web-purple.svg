    <circle cx="0" cy="0" r="7.5"/>
    <line x1="-7.5" y1="0" x2="7.5" y2="0"/>
    <ellipse cx="0" cy="0" rx="3" ry="7.5">
      <animate attributeName="rx" values="3;0.5;3" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <line x1="46" y1="8" x2="46" y2="28" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="23" font-family="'Fira Code', 'Courier New', monospace" font-size="12" font-weight="700" fill="#8B5CF6" letter-spacing="0.8">kforge.vercel.app</text>
</svg>
