<svg xmlns="http://www.w3.org/2000/svg" width="320" height="44" viewBox="0 0 320 44">
  <defs>
    <linearGradient id="webBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
    <filter id="webGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="44" rx="10" fill="url(#webBg)" stroke="#8B5CF6" stroke-width="1.5"/>

  <g transform="translate(24, 22)" stroke="#8B5CF6" stroke-width="1.6" fill="none" stroke-linecap="round" filter="url(#webGlow)">
    <circle cx="0" cy="0" r="7"/>
    <line x1="-7" y1="0" x2="7" y2="0"/>
    <ellipse cx="0" cy="0" rx="3" ry="7">
      <animate attributeName="rx" values="3;0.5;3" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M -6 -3 Q 0 -2 6 -3" stroke-opacity="0.6"/>
    <path d="M -6 3 Q 0 4 6 3" stroke-opacity="0.6"/>
  </g>

  <line x1="52" y1="10" x2="52" y2="34" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1"/>

  <text x="64" y="28" font-family="'Fira Code', 'Courier New', monospace" font-size="13" font-weight="700" fill="#8B5CF6" letter-spacing="1.5">K-FORGE · WEB</text>
</svg>
