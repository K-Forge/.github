<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
  </defs>

  <rect width="900" height="120" rx="12" fill="url(#bgC)" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- Corner brackets -->
  <path d="M 20 14 L 12 14 L 12 22" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>
  <path d="M 880 14 L 888 14 L 888 22" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>
  <path d="M 12 98 L 12 106 L 20 106" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>
  <path d="M 888 98 L 888 106 L 880 106" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>

  <!-- Git branch icon -->
  <g transform="translate(62, 58)" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round">
    <circle cx="0" cy="-26" r="5" fill="#8B5CF6" stroke="none"/>
    <line x1="0" y1="-21" x2="0" y2="-8"/>
    <circle cx="0" cy="-4" r="4" fill="#8B5CF6" stroke="none"/>
    <line x1="-3" y1="-1" x2="-18" y2="13"/>
    <line x1="3" y1="-1" x2="18" y2="13"/>
    <circle cx="-20" cy="19" r="6"/>
    <circle cx="-20" cy="19" r="2.5" fill="#8B5CF6" stroke="none"/>
    <circle cx="20" cy="19" r="6"/>
    <circle cx="20" cy="19" r="2.5" fill="#8B5CF6" stroke="none"/>
  </g>

  <line x1="118" y1="20" x2="118" y2="100" stroke="#8B5CF6" stroke-opacity="0.2" stroke-width="1"/>

  <text x="140" y="56" font-family="'Fira Code', 'Courier New', monospace" font-size="26" font-weight="700" fill="#8B5CF6" letter-spacing="4">CONTRIBUTING</text>
  <text x="142" y="80" font-family="'Fira Code', 'Courier New', monospace" font-size="12" fill="#A78BFA" letter-spacing="1.5">Git Flow  ·  Conventional Commits  ·  SemVer  ·  Estandares de codigo</text>

  <text x="878" y="28" font-family="'Fira Code', 'Courier New', monospace" font-size="10" fill="#8B5CF6" fill-opacity="0.3" text-anchor="end" letter-spacing="2">K-FORGE</text>

  <!-- Shimmer -->
  <rect x="-200" y="115" width="180" height="2.5" rx="1.5" fill="#8B5CF6" fill-opacity="0.5">
    <animate attributeName="x" from="-200" to="920" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
