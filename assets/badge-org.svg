      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
    <filter id="orgGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
