<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="bgCT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A0533"/>
    </linearGradient>
    <filter id="glowCT" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundCT">
      <rect width="900" height="120" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="120" rx="14" fill="url(#bgCT)"/>

  <!-- Border -->
  <rect width="900" height="120" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Corner brackets -->
  <polyline points="0,30 0,0 30,0" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="870,0 900,0 900,30" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="0,90 0,120 30,120" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="870,120 900,120 900,90" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Team/People icon: three figures -->
  <g transform="translate(72, 60)" stroke="#8B5CF6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCT)">
    <!-- Center person -->
    <circle cx="0" cy="-16" r="7" stroke-width="1.8"/>
    <path d="M -11 10 Q -11 0 0 0 Q 11 0 11 10" stroke-width="1.8"/>
    <!-- Left person -->
    <circle cx="-18" cy="-12" r="5.5" stroke-width="1.5" stroke-opacity="0.7"/>
    <path d="M -27 10 Q -27 2 -18 2" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Right person -->
    <circle cx="18" cy="-12" r="5.5" stroke-width="1.5" stroke-opacity="0.7"/>
    <path d="M 27 10 Q 27 2 18 2" stroke-width="1.5" stroke-opacity="0.7"/>
  </g>

  <!-- Vertical separator -->
  <line x1="130" y1="24" x2="130" y2="96" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Title -->
  <text x="160" y="56" font-family="'Fira Code', 'Courier New', monospace" font-size="28" font-weight="700" fill="#8B5CF6" letter-spacing="3" filter="url(#glowCT)">CONTRIBUTORS</text>

  <!-- Subtitle -->
  <text x="162" y="82" font-family="'Fira Code', 'Courier New', monospace" font-size="12" fill="#A78BFA" letter-spacing="2" opacity="0.85">Quienes hacen posible K-Forge</text>

  <!-- Shimmer animation -->
  <rect clip-path="url(#roundCT)" x="-200" y="0" width="180" height="120" fill="url(#shimCT)" opacity="0.04">
    <animateTransform attributeName="transform" type="translate" from="-200 0" to="1100 0" dur="4s" repeatCount="indefinite"/>
  </rect>
  <defs>
    <linearGradient id="shimCT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
