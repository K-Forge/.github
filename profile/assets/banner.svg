<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
      <animate attributeName="x1" values="-100%;100%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <rect width="800" height="200" rx="16" fill="url(#shimmer)"/>

  <!-- Forge spark particles -->
  <circle cx="120" cy="60" r="2" fill="#C4B5FD" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="cy" values="60;40" dur="2.5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="680" cy="140" r="1.5" fill="#DDD6FE" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="140;120" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="350" cy="170" r="1.8" fill="#EDE9FE" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="170;150" dur="2.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="550" cy="50" r="2.2" fill="#C4B5FD" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="cy" values="50;30" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="200" cy="150" r="1.2" fill="#DDD6FE" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="cy" values="150;130" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="720" cy="80" r="1.6" fill="#EDE9FE" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.6s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="80;60" dur="2.6s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- Anvil icon (centered above text) -->
  <g transform="translate(375, 30)" filter="url(#glow)">
    <rect x="0" y="30" width="50" height="8" rx="2" fill="#EDE9FE" opacity="0.9"/>
    <rect x="5" y="18" width="40" height="14" rx="3" fill="#DDD6FE" opacity="0.9"/>
    <rect x="15" y="10" width="20" height="10" rx="2" fill="#C4B5FD" opacity="0.9"/>
    <!-- Spark on anvil -->
    <circle cx="25" cy="8" r="3" fill="#FBBF24" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- K-Forge text -->
  <text x="400" y="115" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    K-Forge
  </text>

  <!-- Tagline -->
  <text x="400" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#C4B5FD" text-anchor="middle" letter-spacing="6" opacity="0">
    FORJAMOS IDEAS · CREAMOS FUTURO
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze" begin="0.5s"/>
  </text>

  <!-- Underline accent -->
  <rect x="280" y="160" width="0" height="1.5" rx="1" fill="#A78BFA" opacity="0.6">
    <animate attributeName="width" values="0;240" dur="1.2s" fill="freeze" begin="0.8s"/>
  </rect>
</svg>
